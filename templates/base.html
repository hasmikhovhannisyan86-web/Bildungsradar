<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BildungsRadar{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="logo">BildungsRadar</a>
        <div class="nav-links">
            <a href="{{ url_for('chat') }}" class="nav-link">&#128172; Elternberatung</a>
            <a href="{{ url_for('prompt_compare') }}" class="nav-link">&#9881; Prompt-Vergleich</a>
            <a href="{{ url_for('favorites') }}" class="nav-link">&#9829; Favoriten</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>BildungsRadar - Schulprojekt AI Engineering</p>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
